<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ sondage["question"] }}</title>
</head>
<body>
    <h1>{{ sondage["question"] }}</h1>
    <form action="/voter/{{ sondage['code_partage'] }}" method="POST">
        {% for option in options %}
            <label>
                <input type="radio" name="option_id" value="{{ option['id'] }}" required>
                {{ option["texte"] }}
            </label><br>
        {% endfor %}
        <button type="submit">Voter</button>
    </form>
    <p>Lien à partager : {{ request.url }}</p>
</body>
</html>
